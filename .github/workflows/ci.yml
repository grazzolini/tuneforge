name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Lint commits
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
        with:
          configFile: commitlint.config.cjs

      - name: Set up pnpm
        if: github.event_name == 'pull_request'
        uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1
        with:
          version: 10.33.0

      - name: Set up Node
        if: github.event_name == 'pull_request'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install commitlint
        if: github.event_name == 'pull_request'
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint PR title (squash commit message)
        if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | pnpm exec commitlint

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Sync backend dependencies
        working-directory: apps/backend
        run: uv sync --locked --all-groups

      - name: Lint backend
        working-directory: apps/backend
        run: uv run --python 3.11 ruff check .

      - name: Type-check backend
        working-directory: apps/backend
        run: uv run --python 3.11 mypy app

      - name: Test backend
        working-directory: apps/backend
        run: uv run --python 3.11 pytest

  desktop:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync backend dependencies for OpenAPI generation
        working-directory: apps/backend
        run: uv sync --locked --all-groups

      - name: Generate shared contracts
        run: pnpm contracts:generate

      - name: Verify generated contracts are committed
        run: git diff --exit-code -- packages/shared-types/src/generated/openapi.ts

      - name: Lint desktop
        run: pnpm --filter @tuneforge/desktop lint

      - name: Type-check desktop
        run: pnpm --filter @tuneforge/desktop typecheck

      - name: Test desktop
        run: pnpm --filter @tuneforge/desktop test --run
